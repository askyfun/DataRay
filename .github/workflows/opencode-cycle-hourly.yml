name: DataRay Hourly Development Cycle

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: '选择要运行的 Agent'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - pm-agent
          - architect-agent
          - developer-agent
          - qa-agent

jobs:
  pm-agent:
    name: Project Manager Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run PM Agent
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: minimax-cn-coding-plan/MiniMax-M2.5
          prompt: |
            你作为项目经理 agent，分析 docs/*.md 文档，确认产品还有哪些待改进的需求。
            重点关注：
            - docs/todo.md 中的待完成任务
            - docs/architecture.md 中的架构设计
            - docs/api-spec.md 中的API规范
            - README.md 中的功能特性
            
            输出：
            1. 将需要改进的需求整理成清晰的列表
            2. 使用 GitHub CLI 创建对应的 issue，格式如下：
               - Title: [PM] <需求标题>
               - Body: 详细描述需求的背景、目标和验收标准
               - Labels: "enhancement", "pm"
               
            如果发现的是 bug，使用 [Bug] 标记并添加 "bug" 标签。

  architect-agent:
    name: Architect Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Architect Agent
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: minimax-cn-coding-plan/MiniMax-M2.5
          prompt: |
            你作为架构师 agent，根据 docs/todo.md 分析产品需求和技术架构上的问题。
            重点关注：
            - 后端 Go 代码的架构合理性
            - 前端 React 代码的架构模式
            - 性能优化空间
            - 安全性问题
            
            输出：
            1. 拆分更具体的开发任务，包括具体的实现方案
            2. 使用 GitHub CLI 创建对应的 issue，格式如下：
               - Title: [Architect] <任务标题>
               - Body: 详细描述技术方案、实现步骤和预期影响
               - Labels: "enhancement", "architect"
               
            如果发现安全或性能严重问题，使用 "security" 或 "performance" 标签。

  developer-agent:
    name: Developer Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Developer Agent
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: minimax-cn-coding-plan/MiniMax-M2.5
          prompt: |
            你作为程序员 agent，根据 GitHub issues 完成功能的开发。
            
            任务流程：
            1. 使用 gh issue list 扫描状态为 open 的 issues（排除 qa 关闭的）
            2. 优先处理带有 "high-priority" 标签的 issue
            3. 按照以下标签优先级处理：bug > security > performance > architect > enhancement > pm
            
            开发要求：
            - 遵循项目现有的代码规范（参考 docs/coding-style.md）
            - 确保后端 Go 代码有单元测试覆盖
            - 运行 go test 验证测试通过
            
            完成后：
            1. 提交代码并推送
            2. 创建 PR，标题格式："Fix: <issue 标题>"
            3. 在 PR body 中关联 issue（使用 Closes #<issue-number>）
            4. 使用 gh issue close <issue-number> 关闭 issue 并添加标签 "developer-done"
            
            注意：不要修改已经分配给其他人处理的 issue。

  qa-agent:
    name: QA Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run QA Agent
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: minimax-cn-coding-plan/MiniMax-M2.5
          prompt: |
            你作为测试人员 agent，根据已合并的 PR 进行测试验证。
            
            任务流程：
            1. 扫描带有 "developer-done" 标签的 issues（这些是待测试的）
            2. 对于每个待测试的 issue：
               - 查看关联的 PR 和代码变更
               - 分析代码逻辑，运行相关测试
               - 验证功能是否按预期工作
            
            测试重点：
            - 后端 Go 代码的错误处理
            - 前端 React 代码的边界条件
            - API 接口的参数校验
            - 数据库查询的 SQL 注入风险
            
            验证结果：
            - 测试通过：使用 gh issue edit <issue-number> --add-label "qa-passed" 标记
            - 测试失败：使用 gh issue comment <issue-number> -b "测试失败原因..." 并添加标签 "qa-failed"
            
            注意：只有测试完全通过后才能标记为 qa-passed。

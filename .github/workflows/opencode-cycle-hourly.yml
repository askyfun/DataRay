name: DataRay Hourly Development Cycle

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: '选择要运行的 Agent'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - pm-agent
          - architect-agent
          - developer-agent
          - qa-agent

jobs:
  pm-agent:
    if: inputs.target == 'all' || inputs.target == 'pm-agent'
    name: Project Manager Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run PM Agent
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: minimax-cn-coding-plan/MiniMax-M2.5
          prompt: |
            你作为项目经理 agent，分析 docs/*.md 文档，确认产品还有哪些待改进的需求。
            重点关注：
            - docs/todo.md 中的待完成任务
            - docs/architecture.md 中的架构设计
            - docs/api-spec.md 中的API规范
            - README.md 中的功能特性
            
            重要 - 避免重复 Issue：
            在创建新 issue 之前，必须先使用 gh issue list 检查是否已存在类似的 issue：
            1. 列出所有 open 状态的 issues
            2. 对比新需求与现有 issues 的标题和内容
            3. 如果存在相似需求（关键词匹配或功能相同），跳过创建，直接在已有的 issue 上添加评论说明新需求
            4. 只有确认没有重复的 issue 才创建新的
            
            输出：
            1. 将需要改进的需求整理成清晰的列表
            2. 对每个需求检查是否已存在重复
            3. 使用 GitHub CLI 创建对应的 issue（排除重复后），格式如下：
               - Title: [PM] <需求标题>
               - Body: 详细描述需求的背景、目标和验收标准
               - Labels: "enhancement", "pm"
               
            如果发现的是 bug，使用 [Bug] 标记并添加 "bug" 标签。

  architect-agent:
    if: inputs.target == 'all' || inputs.target == 'architect-agent'
    name: Architect Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Architect Agent
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: minimax-cn-coding-plan/MiniMax-M2.5
          prompt: |
            你作为架构师 agent，根据 docs/todo.md 分析产品需求和技术架构上的问题。
            重点关注：
            - 后端 Go 代码的架构合理性
            - 前端 React 代码的架构模式
            - 性能优化空间
            - 安全性问题
            
            输出：
            1. 拆分更具体的开发任务，包括具体的实现方案
            2. 使用 GitHub CLI 创建对应的 issue，格式如下：
               - Title: [Architect] <任务标题>
               - Body: 详细描述技术方案、实现步骤和预期影响
               - Labels: "enhancement", "architect"
               
            如果发现安全或性能严重问题，使用 "security" 或 "performance" 标签。

  developer-agent:
    if: inputs.target == 'all' || inputs.target == 'developer-agent'
    name: Developer Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Find next issue
        env:
          GH_TOKEN: ${{ github.token }}
        id: find-issue
        run: |
          # 只扫描带有 problem-confirmed 标签的 issue（需要人工确认后才处理）
          issue=$(gh issue list --state open --label "problem-confirmed" --limit 1 --json number,title,labels -q '.[0]')
          
          if [ -z "$issue" ]; then
            echo "no_issue=true" >> $GITHUB_OUTPUT
            echo "没有找到待处理的 issue"
          else
            echo "no_issue=false" >> $GITHUB_OUTPUT
            echo "issue_number=$(echo $issue | jq -r '.number')" >> $GITHUB_OUTPUT
            echo "issue_title=$(echo $issue | jq -r '.title')" >> $GITHUB_OUTPUT
            echo "issue_labels=$(echo $issue | jq -r '.labels | map(.name) | join(",")')" >> $GITHUB_OUTPUT
            echo "找到待处理 issue: $(echo $issue | jq -r '.number') - $(echo $issue | jq -r '.title')"
          fi

      - name: Trigger single issue workflow
        if: steps.find-issue.outputs.no_issue != 'true'
        run: |
          gh workflow run opencode-developer-single.yml \
            -f issue_number=${{ steps.find-issue.outputs.issue_number }} \
            -f issue_title="${{ steps.find-issue.outputs.issue_title }}" \
            -f issue_labels="${{ steps.find-issue.outputs.issue_labels }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  qa-agent:
    if: inputs.target == 'all' || inputs.target == 'qa-agent'
    name: QA Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run QA Agent
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: minimax-cn-coding-plan/MiniMax-M2.5
          prompt: |
            你作为测试人员 agent，根据已合并的 PR 进行测试验证。
            
            任务流程：
            1. 扫描带有 "developer-done" 标签的 issues（这些是待测试的）
            2. 对于每个待测试的 issue：
               - 查看关联的 PR 和代码变更
               - 分析代码逻辑，运行相关测试
               - 验证功能是否按预期工作
            
            测试重点：
            - 后端 Go 代码的错误处理
            - 前端 React 代码的边界条件
            - API 接口的参数校验
            - 数据库查询的 SQL 注入风险
            
            验证结果：
            - 测试通过：使用 gh issue edit <issue-number> --add-label "qa-passed" 标记
            - 测试失败：使用 gh issue comment <issue-number> -b "测试失败原因..." 并添加标签 "qa-failed"
            
            注意：只有测试完全通过后才能标记为 qa-passed。

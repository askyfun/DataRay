name: Developer Agent - Single Issue

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue 编号'
        required: true
        type: string
      issue_title:
        description: 'Issue 标题'
        required: true
        type: string
      issue_labels:
        description: 'Issue 标签（逗号分隔）'
        required: false
        type: string

jobs:
  develop:
    name: Developer Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Developer Agent
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        with:
          model: minimax-cn-coding-plan/MiniMax-M2.5
          prompt: |
            你作为程序员 agent，处理 GitHub issue #{{ github.event.inputs.issue_number }}。
            
            Issue 信息：
            - 编号: ${{ github.event.inputs.issue_number }}
            - 标题: ${{ github.event.inputs.issue_title }}
            - 标签: ${{ github.event.inputs.issue_labels }}
            
            开发要求：
            - 遵循项目现有的代码规范（参考 docs/coding-style.md）
            - 确保后端 Go 代码有单元测试覆盖
            - 运行 go test 验证测试通过
            
            完成后：
            1. 提交代码并推送
            2. 创建 PR，标题格式："Fix: <issue 标题>"
            3. 在 PR body 中关联 issue（使用 Closes #${{ github.event.inputs.issue_number }}）
            4. 添加标签 "developer-done"（不要关闭 issue，等待 QA 测试通过后关闭）
            
            注意：只处理这一个 issue，不要扫描其他 issues。

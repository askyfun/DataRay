version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: dataray-postgres
    environment:
      POSTGRES_USER: dataray
      POSTGRES_PASSWORD: dataray123
      POSTGRES_DB: dataray
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataray"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataray-backend
    environment:
      DATABASE_URL: postgres://dataray:dataray123@postgres:5432/dataray?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dataray-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
